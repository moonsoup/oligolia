name: Build Oligolia

on:
  push:
    tags: ["v*"]         # trigger on version tags: git tag v0.1.0 && git push --tags
  workflow_dispatch:     # allow manual trigger from GitHub UI

permissions:
  contents: write        # needed to create GitHub Releases

jobs:

  # ── macOS DMG ─────────────────────────────────────────────────────────────
  build-mac:
    name: macOS .dmg
    runs-on: macos-14    # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install --quiet -r backend/requirements.txt PyInstaller PyQt6 Pillow

      - name: Build DMG + code patch
        run: make mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oligolia-mac
          path: |
            dist/Oligolia-*.dmg
            dist/Oligolia-*-mac-patch.tar.gz
            dist/Oligolia-*-manifest.json

  # ── Windows installer ──────────────────────────────────────────────────────
  build-win:
    name: Windows installer
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv backend\.venv
          backend\.venv\Scripts\pip install --quiet -r backend\requirements.txt PyInstaller PyQt6 Pillow

      - name: Install Inno Setup
        run: |
          choco install innosetup --yes --no-progress
        shell: cmd

      - name: Build installer
        run: build\build_win.bat
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oligolia-win
          path: dist/Oligolia-*-Setup.exe

  # ── Linux AppImage ─────────────────────────────────────────────────────────
  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1-mesa-dev libglib2.0-0 libdbus-1-3 \
            libxcb-xinerama0 libxkbcommon-x11-0 libxcb-cursor0 \
            fuse libfuse2

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Install Python dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install --quiet -r backend/requirements.txt PyInstaller PyQt6 Pillow

      - name: Build AppImage
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 &
          bash build/build_linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oligolia-linux
          path: dist/Oligolia-*.AppImage

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/oligolia-mac/*.dmg
            dist/oligolia-mac/*-patch.tar.gz
            dist/oligolia-mac/*-manifest.json
            dist/oligolia-win/*.exe
            dist/oligolia-linux/*.AppImage
          body: |
            ## Oligolia ${{ github.ref_name }}

            Gene editing and viewing platform — no installation of Python required.

            ### Update (existing users)

            Open Oligolia → **Help → Check for Updates** — the app will download
            the patch automatically (~11 MB instead of the full installer).

            ### Fresh install

            | Platform | File | Size | Instructions |
            |----------|------|------|--------------|
            | **macOS** | `Oligolia-*-mac.dmg` | ~260 MB | Open DMG → drag to Applications → launch from Launchpad |
            | **Windows** | `Oligolia-*-Setup.exe` | ~260 MB | Run installer → finish → launch from Start Menu or desktop |
            | **Linux** | `Oligolia-*.AppImage` | ~260 MB | `chmod +x` → double-click |

            ### Features
            - Sequence editing (insert/delete/replace/translate/CRISPR)
            - Multi-database search: NCBI, Ensembl, UniProt, KEGG
            - CRISPR guide RNA design (SpCas9, Cas12a, Cas13)
            - Pairwise & multiple sequence alignment
            - PCR primer design + restriction enzyme analysis
            - VCF variant viewer
            - FASTA, FASTQ, GenBank, EMBL, GFF3/GTF, VCF support
          draft: false
          prerelease: false
