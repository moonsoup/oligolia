name: Bug Report
description: Something isn't working correctly
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: input
    id: version
    attributes:
      label: Oligolia version
      placeholder: "e.g. 0.3.0 (Help → About)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [macOS, Windows, Linux]
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to DB Search
        2. Search for 'BRCA2'
        3. Click Load Sequence
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error message (if any)
      render: text
