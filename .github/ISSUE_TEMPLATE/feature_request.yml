name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are reviewed weekly and prioritised. Thank you!

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Sequence editing
        - Database search / integration
        - CRISPR design
        - Alignment
        - Variant analysis
        - Protein analysis
        - File format support
        - User interface
        - Performance
        - Export / sharing
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow pain point or gap.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the feature
      description: What should it do? How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other tools or workarounds you use today.

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would significantly improve my workflow
        - Blocking — I can't use Oligolia without this
